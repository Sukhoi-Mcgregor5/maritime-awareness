<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maritime Intelligence — Investigate</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0d1b2a;
      color: #e0e6f0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: #0d1b2a;
      border-bottom: 1px solid #1e3a5f;
      flex-shrink: 0;
    }
    header h1 { font-size: 1rem; font-weight: 600; letter-spacing: 0.04em; color: #7eb8f7; }
    .nav-links { margin-left: auto; display: flex; gap: 16px; }
    .nav-links a { font-size: 0.8rem; color: #6b8cae; text-decoration: none; }
    .nav-links a:hover { color: #7eb8f7; }

    /* ── Feed ── */
    #feed {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Bubble wrappers ── */
    .bubble-row {
      display: flex;
      gap: 10px;
      max-width: 780px;
      width: 100%;
    }
    .bubble-row.user  { align-self: flex-end; flex-direction: row-reverse; }
    .bubble-row.assistant { align-self: flex-start; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .bubble-row.user .avatar      { background: #1e3a5f; color: #7eb8f7; }
    .bubble-row.assistant .avatar { background: #0f2d4a; color: #4db8a4; }

    .bubble {
      border-radius: 12px;
      padding: 12px 16px;
      max-width: calc(100% - 44px);
      line-height: 1.55;
      font-size: 0.9rem;
    }
    .bubble-row.user .bubble {
      background: #1e3a5f;
      color: #d4e8ff;
      border-bottom-right-radius: 4px;
    }
    .bubble-row.assistant .bubble {
      background: #0f2234;
      border: 1px solid #1e3a5f;
      border-bottom-left-radius: 4px;
    }

    /* ── Brief card inside assistant bubble ── */
    .brief { display: flex; flex-direction: column; gap: 14px; }

    .brief-summary {
      font-size: 0.95rem;
      color: #c8ddf5;
      line-height: 1.6;
    }

    .brief-section h3 {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #4d7aa8;
      margin-bottom: 6px;
    }
    .brief-section ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .brief-section ul li {
      display: flex;
      gap: 8px;
      font-size: 0.875rem;
      color: #b8cfe8;
      line-height: 1.5;
    }
    .brief-section ul li::before {
      content: "›";
      color: #4db8a4;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .vessels-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .mmsi-chip {
      font-size: 0.75rem;
      font-family: ui-monospace, monospace;
      background: #0d2a3f;
      border: 1px solid #1e5080;
      color: #7eb8f7;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .confidence-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 12px;
      align-self: flex-start;
    }
    .confidence-badge.high   { background: #0d3320; color: #4caf7d; border: 1px solid #1a5c38; }
    .confidence-badge.medium { background: #2d2800; color: #d4a843; border: 1px solid #5c4a00; }
    .confidence-badge.low    { background: #2d1010; color: #d46060; border: 1px solid #5c2020; }
    .confidence-badge::before { content: "●"; font-size: 0.55rem; }

    .error-bubble {
      background: #1f0e0e;
      border: 1px solid #5c2020;
      color: #d46060;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.875rem;
    }

    /* ── Spinner ── */
    .spinner-row { align-self: flex-start; }
    .spinner {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 16px;
    }
    .spinner span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4d7aa8;
      animation: bounce 1.1s infinite ease-in-out;
    }
    .spinner span:nth-child(2) { animation-delay: 0.18s; }
    .spinner span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40%            { transform: scale(1);   opacity: 1;   }
    }

    /* ── Example prompts ── */
    #examples {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin: auto;
      padding: 32px 16px;
      text-align: center;
    }
    #examples h2 { font-size: 1.1rem; color: #7eb8f7; font-weight: 500; }
    #examples p  { font-size: 0.8rem; color: #4d7aa8; }
    .example-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 600px;
    }
    .chip {
      background: #0f2234;
      border: 1px solid #1e3a5f;
      color: #a0c4f1;
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 0.825rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .chip:hover { border-color: #4d7aa8; color: #d4e8ff; }

    /* ── Input bar ── */
    #input-bar {
      flex-shrink: 0;
      padding: 12px 16px 16px;
      border-top: 1px solid #1e3a5f;
      background: #0d1b2a;
    }
    .input-wrap {
      display: flex;
      gap: 8px;
      max-width: 780px;
      margin: 0 auto;
    }
    #query-input {
      flex: 1;
      background: #0f2234;
      border: 1px solid #1e3a5f;
      color: #e0e6f0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
      resize: none;
      height: 44px;
      min-height: 44px;
      max-height: 140px;
      overflow-y: auto;
      line-height: 1.5;
      font-family: inherit;
    }
    #query-input:focus { border-color: #4d7aa8; }
    #query-input::placeholder { color: #3a5a7a; }

    #submit-btn {
      background: #1a4a7a;
      border: none;
      color: #7eb8f7;
      border-radius: 8px;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #submit-btn:hover:not(:disabled) { background: #1e5a94; }
    #submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #submit-btn svg { width: 18px; height: 18px; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      #feed { padding: 16px 10px; }
      .bubble-row { max-width: 100%; }
      #examples h2 { font-size: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Maritime Intelligence</h1>
  <nav class="nav-links">
    <a href="/map">Map</a>
    <a href="/">Dashboard</a>
  </nav>
</header>

<div id="feed">
  <div id="examples">
    <h2>Maritime Investigator</h2>
    <p>Ask anything about vessel activity, anomalies, or suspicious behaviour.</p>
    <div class="example-chips">
      <button class="chip" onclick="submitQuery(this.textContent)">Which tankers went dark in the last hour?</button>
      <button class="chip" onclick="submitQuery(this.textContent)">Show me vessels that are loitering</button>
      <button class="chip" onclick="submitQuery(this.textContent)">Find all active anomalies</button>
      <button class="chip" onclick="submitQuery(this.textContent)">List cargo ships currently under way</button>
      <button class="chip" onclick="submitQuery(this.textContent)">Are there any military vessels being tracked?</button>
    </div>
  </div>
</div>

<div id="input-bar">
  <div class="input-wrap">
    <textarea id="query-input" placeholder="Ask an intelligence question…" rows="1"></textarea>
    <button id="submit-btn" title="Submit">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
  const feed       = document.getElementById('feed');
  const examples   = document.getElementById('examples');
  const input      = document.getElementById('query-input');
  const submitBtn  = document.getElementById('submit-btn');

  // Auto-grow textarea
  input.addEventListener('input', () => {
    input.style.height = '44px';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSubmit();
    }
  });
  submitBtn.addEventListener('click', handleSubmit);

  function handleSubmit() {
    const query = input.value.trim();
    if (!query) return;
    submitQuery(query);
  }

  function submitQuery(query) {
    if (examples) examples.remove();
    input.value = '';
    input.style.height = '44px';

    appendUserBubble(query);
    const spinner = appendSpinner();
    setLoading(true);

    fetch('/api/v1/investigate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query }),
    })
      .then(res => {
        if (!res.ok) return res.json().then(e => Promise.reject(e));
        return res.json();
      })
      .then(data => {
        spinner.remove();
        appendBriefBubble(data);
      })
      .catch(err => {
        spinner.remove();
        appendErrorBubble(err?.detail || err?.message || 'Unexpected error. Please try again.');
      })
      .finally(() => setLoading(false));
  }

  function setLoading(on) {
    submitBtn.disabled = on;
    input.disabled = on;
  }

  function appendUserBubble(text) {
    const row = document.createElement('div');
    row.className = 'bubble-row user';
    row.innerHTML = `
      <div class="avatar">U</div>
      <div class="bubble">${escHtml(text)}</div>
    `;
    feed.appendChild(row);
    scrollDown();
  }

  function appendSpinner() {
    const row = document.createElement('div');
    row.className = 'bubble-row assistant spinner-row';
    row.innerHTML = `
      <div class="avatar">M</div>
      <div class="bubble" style="padding:0">
        <div class="spinner"><span></span><span></span><span></span></div>
      </div>
    `;
    feed.appendChild(row);
    scrollDown();
    return row;
  }

  function appendBriefBubble(data) {
    const confidence = (data.confidence || 'medium').toLowerCase();

    let findingsHtml = '';
    if (data.findings?.length) {
      findingsHtml = `
        <div class="brief-section">
          <h3>Findings</h3>
          <ul>${data.findings.map(f => `<li>${escHtml(f)}</li>`).join('')}</ul>
        </div>`;
    }

    let recommendationsHtml = '';
    if (data.recommendations?.length) {
      recommendationsHtml = `
        <div class="brief-section">
          <h3>Recommendations</h3>
          <ul>${data.recommendations.map(r => `<li>${escHtml(r)}</li>`).join('')}</ul>
        </div>`;
    }

    let vesselsHtml = '';
    if (data.vessels_of_interest?.length) {
      vesselsHtml = `
        <div class="brief-section">
          <h3>Vessels of Interest</h3>
          <div class="vessels-row">
            ${data.vessels_of_interest.map(m => `<span class="mmsi-chip">${escHtml(m)}</span>`).join('')}
          </div>
        </div>`;
    }

    const row = document.createElement('div');
    row.className = 'bubble-row assistant';
    row.innerHTML = `
      <div class="avatar">M</div>
      <div class="bubble">
        <div class="brief">
          <div class="brief-summary">${escHtml(data.summary || 'No summary available.')}</div>
          ${findingsHtml}
          ${recommendationsHtml}
          ${vesselsHtml}
          <span class="confidence-badge ${confidence}">${confidence} confidence</span>
        </div>
      </div>
    `;
    feed.appendChild(row);
    scrollDown();
  }

  function appendErrorBubble(message) {
    const row = document.createElement('div');
    row.className = 'bubble-row assistant';
    row.innerHTML = `
      <div class="avatar">M</div>
      <div class="bubble"><div class="error-bubble">${escHtml(message)}</div></div>
    `;
    feed.appendChild(row);
    scrollDown();
  }

  function scrollDown() {
    feed.scrollTo({ top: feed.scrollHeight, behavior: 'smooth' });
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>

</body>
</html>
