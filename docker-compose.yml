version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: maritime_db
    environment:
      POSTGRES_USER: maritime
      POSTGRES_PASSWORD: maritime_pass
      POSTGRES_DB: maritime_awareness
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maritime -d maritime_awareness"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
